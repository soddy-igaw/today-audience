  - id: 14
    question: "일간 앱 사용자 조회"
    content: |
      [Example: 일간 앱 사용자 조회]
      Q: 2025년 9월 1일 A 앱을 사용한 사용자 (+1일 처리 주의)
      SQL:
      SELECT ADID
      FROM DMP_ONESTORE.PACKAGE_USAGE_ALL_V2
      WHERE PACKAGE_NAME IN (SELECT PACKAGE_NAME
                            FROM DMP.ST_CATEGORY
                            WHERE APP_NAME LIKE '%A%')
      AND SEARCH_KEY = 20250902
      GROUP BY 1

  - id: 15
    question: "주간/월간 앱 사용자 조회"
    content: |
      [Example: 주간/월간 앱 사용자 조회]
      Q1: 2025년 9월 15일-28일 주차에 A앱을 사용한 사용자 (주간)
      SQL1:
      SELECT ADID
      FROM DMP_ONESTORE.PACKAGE_USAGE_ALL_V2
      WHERE PACKAGE_NAME IN (SELECT PACKAGE_NAME
                            FROM DMP.ST_CATEGORY
                            WHERE APP_NAME LIKE '%A%')
      AND SEARCH_KEY BETWEEN 20250915 AND 20250928
      GROUP BY 1

      Q2: 2025년 8월의 1개월 동안 A 앱을 사용한 사용자 (월간)
      SQL2:
      SELECT ADID
      FROM DMP_ONESTORE.PACKAGE_USAGE_MONTHLY
      WHERE PACKAGE_NAME IN (SELECT PACKAGE_NAME
                            FROM DMP.ST_CATEGORY
                            WHERE APP_NAME LIKE '%A%')
      AND SEARCH_KEY = '2508m'
      GROUP BY 1